# ─────────────────────────────────────────────────────────────────────────────
# Medithrex — Cloud Build Pipeline (cloudbuild.yaml)
# Triggered automatically on git push to main branch
#
# Connects to: Cloud Source Repositories / GitHub / GitLab
# Permissions needed: Cloud Build SA needs:
#   - Cloud Run Admin
#   - Storage Admin
#   - Service Account User
#   - Secret Manager Secret Accessor
# ─────────────────────────────────────────────────────────────────────────────

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/medithrex-backend:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/medithrex-backend:latest"
      - "--cache-from"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/medithrex-backend:latest"
      - "."
    dir: "backend"

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/medithrex-backend"
    waitFor: ["build-image"]

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "medithrex-backend"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/medithrex-backend:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=1"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production,PORT=8080,PG_SSL=true"
      - "--set-secrets=PG_HOST=PG_HOST:latest,PG_PORT=PG_PORT:latest,PG_DATABASE=PG_DATABASE:latest,PG_USER=PG_USER:latest,PG_PASSWORD=PG_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,FRONTEND_URL=FRONTEND_URL:latest"
    waitFor: ["push-image"]

# Store the built image in Artifact Registry
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/medithrex-backend:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/medithrex-backend:latest"

# Substitution variables (override at trigger time or in CLI)
substitutions:
  _REGION: "us-central1"   # Change to your preferred region e.g. europe-west1
  _REPO: "medithrex"       # Your Artifact Registry repository name

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "1200s"
