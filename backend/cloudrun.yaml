# ─────────────────────────────────────────────────────────────────────────────
# Medithrex — Cloud Run Service Definition
# Deploy with: gcloud run services replace cloudrun.yaml --region=REGION
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: medithrex-backend
  labels:
    app: medithrex
    environment: production

spec:
  template:
    metadata:
      annotations:
        # Auto-scale: min 1 instance keeps cold starts low
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Use second-generation execution environment
        run.googleapis.com/execution-environment: gen2

    spec:
      # Allow up to 80 concurrent requests per container instance
      containerConcurrency: 80

      # Timeout per request (in seconds)
      timeoutSeconds: 60

      # Service account (create one with least-privilege access)
      # serviceAccountName: medithrex-sa@PROJECT_ID.iam.gserviceaccount.com

      containers:
        - image: gcr.io/PROJECT_ID/medithrex-backend:latest
          # OR if using Artifact Registry:
          # image: REGION-docker.pkg.dev/PROJECT_ID/medithrex/medithrex-backend:latest

          ports:
            - containerPort: 8080
              protocol: TCP

          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: "0.1"
              memory: 128Mi

          env:
            # ── Non-sensitive config ──────────────────────────────────────────
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: PG_SSL
              value: "true"

            # ── Secrets from Secret Manager ───────────────────────────────────
            # Each secret must be created in Secret Manager first:
            # gcloud secrets create PG_HOST --data-file=- <<< "your-db-host"

            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: PG_HOST
                  key: latest

            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: PG_PORT
                  key: latest

            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: PG_DATABASE
                  key: latest

            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: PG_USER
                  key: latest

            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: PG_PASSWORD
                  key: latest

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest

            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: FRONTEND_URL
                  key: latest

          # Liveness probe — restart container if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          # Startup probe — wait for app to be ready on cold start
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

  traffic:
    # Send 100% of traffic to latest revision
    - percent: 100
      latestRevision: true
